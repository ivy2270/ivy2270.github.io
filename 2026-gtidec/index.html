<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026大台北牙展團購系統</title>
    <link rel="icon" type="image/svg+xml" href="tooth-svgrepo-com.svg">
    <link href="https://font.emtech.cc/css/jfOpenHuninn" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffdae0">
    <style>
        :root { --pink: #ffdae0; --deep-pink: #ff85a2; --green: #e2f0d9; --dark-green: #6a994e; --text: #5a5a5a; }
        * { font-family: 'JFOpenHuninn', sans-serif; box-sizing: border-box; }
        body { background: #fffafb; color: var(--text); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 90px; }
        h1 { text-align: center; color: var(--deep-pink); font-size: 1.6rem; margin: 15px 0; }
        .page { display: none; animation: slideUp 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .card { background: white; padding: 18px; border-radius: 25px; margin-bottom: 15px; border: 2px solid var(--green); box-shadow: 0 4px 15px rgba(255, 182, 193, 0.1); }
        h3 { margin: 0 0 15px 0; color: var(--dark-green); font-size: 1.1rem; }
        h3 i { color: var(--deep-pink); margin-right: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 5px; }
        input, select, button { padding: 12px; border-radius: 15px; border: 2px solid var(--pink); font-size: 1rem; width: 100%; transition: 0.2s; background: white; }
        input:focus { border-color: var(--deep-pink); outline: none; }
        .primary-btn { background: var(--deep-pink); color: white; border: none; font-size: 1.1rem; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 0 #e67691; cursor: pointer; }
        .primary-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #e67691; }
        .order-card { background: #fff; padding: 15px; border-bottom: 2px solid #f9f9f9; display: flex; flex-direction: column; gap: 5px; position: relative; }
        .order-header { display: flex; justify-content: space-between; font-weight: bold; color: var(--deep-pink); }
        .total-box { background: var(--green); color: var(--dark-green); padding: 10px; border-radius: 12px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .dm-badge { display: inline-flex; align-items: center; background: var(--pink); padding: 8px 15px; border-radius: 20px; margin: 5px; font-size: 0.85rem; color: var(--deep-pink); text-decoration: none; font-weight: bold; }
        .todo-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px dashed var(--pink); }
        .todo-item.done { opacity: 0.5; filter: grayscale(1); }
        .todo-item input { width: 22px; height: 22px; margin-right: 15px; flex-shrink: 0; }
        /* 管理員介面樣式 */
        .admin-controls { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--pink); display: flex; flex-wrap: wrap; gap: 12px; }
        .admin-controls label { font-size: 0.85rem; display: flex; align-items: center; gap: 4px; color: var(--dark-green); font-weight: bold; }
        .admin-controls input[type="checkbox"] { width: 18px; height: 18px; margin:0; }
        .admin-note-input { width: 100%; font-size: 0.85rem !important; padding: 8px !important; margin-top: 5px; border: 1px solid var(--green) !important; background: #fdfdfd; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--pink); z-index: 1000; }
        .nav-btn { border: none; background: none; color: #bbb; font-size: 0.7rem; flex: 1; text-align: center; }
        .nav-btn.active { color: var(--deep-pink); }
        .nav-btn i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        #toast { visibility: hidden; min-width: 200px; background: rgba(0,0,0,0.7); color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%); z-index: 2000; opacity: 0; transition: 0.5s; }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-tooth"></i> 2026大台北牙展團購</h1>

    <div id="addPage" class="page active">
        <div class="card">
            <h3><i class="fa-solid fa-file-signature"></i> 填寫訂單</h3>
            <form id="orderForm" class="form-group">
                <input type="text" id="uName" placeholder="姓名" required autocomplete="off">
                <select id="vSelect"></select>
                <input type="text" id="iName" placeholder="商品完整名稱" required autocomplete="off">
                <div class="input-row">
                    <input type="number" id="qty" placeholder="數量" required>
                    <input type="number" id="price" placeholder="單價" required>
                </div>
                <input type="text" id="orderNote" placeholder="備註（口味、顏色等）" autocomplete="off">
                <button type="submit" class="primary-btn"><i class="fa-solid fa-paper-plane"></i> 送出訂單</button>
            </form>
        </div>
        <div class="card">
            <h3><i class="fa-solid fa-images"></i> 廠商 DM 列表</h3>
            <div id="dmList">載入中...</div>
        </div>
    </div>

    <div id="listPage" class="page">
        <div class="card">
            <h3><i class="fa-solid fa-magnifying-glass"></i> 明細查詢</h3>
            <div class="form-group">
                <div class="input-row">
                    <input type="text" id="searchName" placeholder="搜姓名" oninput="filterOrders()">
                    <select id="searchVendor" onchange="filterOrders()"><option value="">所有廠商</option></select>
                </div>
                <div class="input-row" id="adminFilters" style="display:none;">
                    <select id="searchBought" onchange="filterOrders()">
                        <option value="">購買狀態(全)</option>
                        <option value="true">已購買</option>
                        <option value="false">未購買</option>
                    </select>
                    <select id="searchPaid" onchange="filterOrders()">
                        <option value="">付款狀態(全)</option>
                        <option value="true">已付款</option>
                        <option value="false">未付款</option>
                    </select>
                </div>
            </div>
            <div class="total-box">篩選總計：$<span id="totalSum">0</span></div>
            <div id="orderDisplay"></div>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="card" style="border-color: var(--deep-pink);">
            <h3><i class="fa-solid fa-store"></i> 編輯廠商名單</h3>
            <div class="form-group">
                <input type="text" id="editVendors" placeholder="廠商A,廠商B (逗號隔開)">
                <button onclick="updateVendors()" class="primary-btn" style="background: var(--dark-green); box-shadow: 0 4px 0 #4f743a;"><i class="fa-solid fa-floppy-disk"></i> 儲存名單</button>
            </div>
        </div>
        <div class="card">
            <h3><i class="fa-solid fa-cloud-arrow-up"></i> 上傳新 DM</h3>
            <div class="form-group">
                <input type="text" id="customFileName" placeholder="DM 名稱">
                <input type="file" id="fileInp" accept="image/*">
                <button id="upBtn" onclick="uploadFile()" class="primary-btn" style="background:var(--dark-green); box-shadow: 0 4px 0 #4f743a;"><i class="fa-solid fa-upload"></i> 確認上傳</button>
            </div>
        </div>
        <div class="card">
            <h3><i class="fa-solid fa-clipboard-check"></i> 待辦清單</h3>
            <div class="input-row">
                <input type="text" id="todoInp" placeholder="新增事項...">
                <button onclick="addTodo()" style="width:60px; background:var(--dark-green); color:white; border:none; border-radius:15px;"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="todoList"></div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="showPage('addPage', this)"><i class="fa-solid fa-cart-shopping"></i>下單</button>
    <button class="nav-btn" onclick="showPage('listPage', this)"><i class="fa-solid fa-list-check"></i>清單</button>
    <button id="adminNav" class="nav-btn" style="display:none;" onclick="showPage('adminPage', this)"><i class="fa-solid fa-user-gear"></i>管理</button>
</nav>
<div id="toast"></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbySm7lhdjW1njs7oGLrT-SyKtMt30fN3tL2sN_z82XzQ0MEafmDyT7kaYBEaBMj8T6j/exec";
    const urlKey = new URLSearchParams(window.location.search).get('key');
    if (urlKey) localStorage.setItem('dent_admin_token', urlKey);
    const key = urlKey || localStorage.getItem('dent_admin_token') || "";

    let orders = [], todos = [], isAdmin = false;

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
    }

    async function init() {
        try {
            const res = await fetch(`${GAS_URL}?key=${key}`);
            const data = await res.json();
            isAdmin = data.isAdmin;
            
            // 介面權限控制
            if (isAdmin) {
                document.getElementById('adminNav').style.display = 'block';
                document.getElementById('adminFilters').style.display = 'flex';
                document.getElementById('editVendors').value = data.vendors.join(',');
                if (data.todos) todos = data.todos.map(t => ({ text: t[0], status: t[1] }));
                renderTodos();
            }

            // 廠商下拉選單
            const vOptions = data.vendors.map(v => `<option value="${v}">${v}</option>`).join('');
            document.getElementById('vSelect').innerHTML = vOptions;
            document.getElementById('searchVendor').innerHTML = '<option value="">所有廠商</option>' + vOptions;
            
            // DM 列表
            document.getElementById('dmList').innerHTML = data.files.map(f => `<a href="${f[2]}" target="_blank" class="dm-badge"><i class="fa-solid fa-image"></i> ${f[0]}</a>`).join('');

            orders = data.orders.slice(1);
            filterOrders();
        } catch (err) { showToast("載入失敗"); }
    }

    function filterOrders() {
    const nKey = document.getElementById('searchName').value.toLowerCase();
    const vKey = document.getElementById('searchVendor').value;
    const bKey = document.getElementById('searchBought').value; // 取得的是字串 "true", "false" 或 ""
    const pKey = document.getElementById('searchPaid').value;   // 取得的是字串 "true", "false" 或 ""

    const filtered = orders.filter(r => {
        // 1. 姓名與廠商篩選
        const mName = r[1].toString().toLowerCase().includes(nKey);
        const mVendor = (vKey === "" || r[2] === vKey);

        // 2. 購買狀態篩選 (r[7] 是已購買)
        // 使用 String() 強制轉型，並處理 null/undefined 的情況
        const rowBoughtStatus = (r[7] === true || r[7] === "TRUE") ? "true" : "false";
        const mBought = (bKey === "" || rowBoughtStatus === bKey);

        // 3. 付款狀態篩選 (r[8] 是已付款)
        const rowPaidStatus = (r[8] === true || r[8] === "TRUE") ? "true" : "false";
        const mPaid = (pKey === "" || rowPaidStatus === pKey);

        return mName && mVendor && mBought && mPaid;
    });

    let total = 0;
    const displayArea = document.getElementById('orderDisplay');
    
    if (filtered.length === 0) {
        displayArea.innerHTML = '<div style="text-align:center; padding:20px; color:#ccc;">沒有符合條件的訂單</div>';
        document.getElementById('totalSum').innerText = "0";
        return;
    }

    displayArea.innerHTML = filtered.map(r => {
        const realIdx = orders.findIndex(o => o === r);
        const sub = (Number(r[4]) || 0) * (Number(r[5]) || 0); 
        total += sub;
        
        // 重新判斷狀態用於顯示 UI
        const isBought = (r[7] === true || r[7] === "TRUE");
        const isPaid = (r[8] === true || r[8] === "TRUE");

        let adminUI = '';
        if (isAdmin) {
            adminUI = `
                <div class="admin-controls">
                    <label><input type="checkbox" ${isBought ? 'checked' : ''} onchange="syncOrderUpdate(${realIdx},'bought',this.checked)"> 已購</label>
                    <label><input type="checkbox" ${isPaid ? 'checked' : ''} onchange="syncOrderUpdate(${realIdx},'paid',this.checked)"> 已付</label>
                    <input type="text" class="admin-note-input" placeholder="主購備註..." value="${r[9]||''}" onblur="syncOrderUpdate(${realIdx},'note',this.value)">
                </div>`;
        } else if (isBought || isPaid) {
            adminUI = `<div style="margin-top:5px;">
                ${isBought ? '<span class="dm-badge" style="background:#e2f0d9;color:#6a994e;">已購買</span>' : ''}
                ${isPaid ? '<span class="dm-badge" style="background:#e2f0d9;color:#6a994e;">已付款</span>' : ''}
            </div>`;
        }

        return `
            <div class="order-card" style="${isPaid ? 'border-left:5px solid var(--dark-green)' : ''}">
                <div class="order-header"><span><i class="fa-solid fa-user"></i> ${r[1]}</span><span>$${sub.toLocaleString()}</span></div>
                <div class="order-detail"><i class="fa-solid fa-shop"></i> ${r[2]} | <i class="fa-solid fa-box"></i> ${r[3]} (x${r[4]})</div>
                ${r[6] ? `<div style="font-size:0.8rem; color:#999; margin-top:2px;">備註：${r[6]}</div>` : ''}
                ${adminUI}
            </div>`;
    }).join('');
    
    document.getElementById('totalSum').innerText = total.toLocaleString();
}

    async function syncOrderUpdate(idx, field, val) {
        if(field==='bought') orders[idx][7] = val;
        if(field==='paid') orders[idx][8] = val;
        if(field==='note') orders[idx][9] = val;
        
        filterOrders(); // 立即更新 UI
        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify({
                action: "updateOrder", index: idx, bought: orders[idx][7], paid: orders[idx][8], adminNote: orders[idx][9]
            })});
            showToast("雲端同步成功");
        } catch(e) { showToast("同步失敗"); }
    }

    // 待辦清單邏輯
    function renderTodos() {
        document.getElementById('todoList').innerHTML = todos.map((t,i) => `
            <div class="todo-item ${t.status==='done'?'done':''}">
                <input type="checkbox" ${t.status==='done'?'checked':''} onchange="toggleTodo(${i})">
                <span>${t.text}</span>
            </div>`).join('');
    }
    function addTodo() {
        const val = document.getElementById('todoInp').value;
        if(!val) return;
        todos.push({text: val, status: 'open'});
        document.getElementById('todoInp').value = '';
        syncTodos();
    }
    function toggleTodo(i) {
        todos[i].status = todos[i].status === 'done' ? 'open' : 'done';
        syncTodos();
    }
    async function syncTodos() {
        renderTodos();
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"syncTodos", todos: todos}) });
    }

    function showToast(m) {
        const t = document.getElementById("toast");
        t.innerText = m; t.className = "show";
        setTimeout(() => t.className = "", 3000);
    }

    document.getElementById('orderForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 送出中...';
        const p = { 
            action: "addOrder", 
            name: document.getElementById('uName').value, 
            vendor: document.getElementById('vSelect').value, 
            item: document.getElementById('iName').value, 
            qty: document.getElementById('qty').value, 
            price: document.getElementById('price').value,
            note: document.getElementById('orderNote').value
        };
        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(p) });
            showToast("下單成功！🌸");
            e.target.reset();
            setTimeout(() => location.reload(), 1500);
        } catch (err) { showToast("錯誤"); btn.disabled = false; }
    };

    async function updateVendors() {
        const v = document.getElementById('editVendors').value;
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "updateConfig", vendors: v }) });
        showToast("已更新！"); setTimeout(() => location.reload(), 1000);
    }

    async function uploadFile() {
        const f = document.getElementById('fileInp').files[0];
        const n = document.getElementById('customFileName').value;
        if(!f || !n) return showToast("請完整填寫");
        const reader = new FileReader();
        reader.readAsDataURL(f);
        reader.onload = async () => {
            const p = { action: "uploadImage", customName: n, filename: f.name, mimeType: f.type, base64: reader.result.split(',')[1] };
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(p) });
            showToast("上傳成功！"); setTimeout(() => location.reload(), 1000);
        };
    }

    init();
</script>
</body>
</html>
